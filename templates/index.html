<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Analysis Tool</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }

    h1 {
      color: #333;
    }

    .container {
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 8px;
      background: #f9f9f9;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input[type="file"] {
      display: block;
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      background-color: #007bff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background-color: #0056b3;
    }

    .message {
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 4px;
    }

    .message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>

<body>
  <h1>AI Data Indicator analyzer</h1>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  {% for category, message in messages %}
  <div class="message {{ category }}">{{ message }}</div>
  {% endfor %}
  {% endif %}
  {% endwith %}

  <div class="container">
    <p>Upload your CSV or Excel file to get results.</p>
    <form action="/analyze" method="post" enctype="multipart/form-data">
      <div class="form-group">
        <label for="file">Select File:</label>
        <input type="file" name="file" id="file" accept=".csv, .xlsx, .xls" required>
      </div>
      <button type="submit">Analyze File</button>
    </form>
  </div>
</body>

</html>
