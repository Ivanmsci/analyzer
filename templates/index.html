<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <title>Data Analysis Tool</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: black;
      color: white;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }

    h1 {
      font-family: 'Press Start 2P', cursive;
      color: #00ffff;
      text-shadow: 2px 2px #0055ff;
      line-height: 1.4;
      font-size: 24px;
      margin-bottom: 30px;
    }

    .container {
      border: 4px solid #333;
      padding: 20px;
      border-radius: 8px;
      background: #111;
      color: #eee;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input[type="file"] {
      display: block;
      width: 100%;
      padding: 10px;
      border: 2px solid #444;
      border-radius: 4px;
      background-color: #222;
      color: white;
      box-sizing: border-box;
    }

    button {
      background-color: #007bff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background-color: #0056b3;
    }

    .message {
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 4px;
    }

    .message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>

<body>
  <h1>AI Data Indicator analyzer</h1>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  {% for category, message in messages %}
  <div class="message {{ category }}">{{ message }}</div>
  {% endfor %}
  {% endif %}
  {% endwith %}

  <div class="container">
    <p>Upload your CSV or Excel file to get results.</p>
    <form action="/analyze" method="post" enctype="multipart/form-data">
      <div class="form-group">
        <label for="file">Select File:</label>
        <input type="file" name="file" id="file" accept=".csv, .xlsx, .xls" required>
      </div>
      <button type="submit">Analyze File</button>
    </form>
  </div>
</body>

</html>
